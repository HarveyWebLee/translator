<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>英文网页翻译助手</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="header">
      <h1>英文网页翻译</h1>
      <p class="subtitle">DeepSeek 大模型驱动</p>
    </header>

    <section class="status" id="pageStatus">
      <span class="status__dot" id="statusDot"></span>
      <span id="statusText">正在检测当前页面…</span>
    </section>

    <section class="actions">
      <button type="button" class="btn btn--primary" id="btnTranslate">翻译当前页</button>
      <button type="button" class="btn btn--secondary" id="btnDetect">重新检测</button>
    </section>

    <section class="settings">
      <label class="toggle">
        <input type="checkbox" id="enabled" checked />
        <span>启用扩展</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="autoPrompt" checked />
        <span>英文页自动提示</span>
      </label>
      <label class="toggle">
        <input type="checkbox" id="selectTranslate" />
        <span>划词翻译（选中英文显示面板）</span>
      </label>
    </section>

    <footer class="footer">
      <a href="#" id="openOptions">配置 API Key</a>
    </footer>

    <script src="popup.js"></script>
  </body>
</html>
