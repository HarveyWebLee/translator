services:
  postgres:
    image: postgres:16-alpine
    container_name: translator-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: translator
      POSTGRES_PASSWORD: translator
      POSTGRES_DB: translator
    ports:
      - '5432:5432'
    volumes:
      - translator_pg_data:/var/lib/postgresql/data

volumes:
  translator_pg_data:
